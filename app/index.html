<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>한국 오픈 API 자연어 검색 · API 게이트웨이</title>
  <meta name="description" content="한국어로 말하면 맞는 한국 오픈 API를 찾아주고 호출 코드까지 생성합니다. 로컬 임베딩 기반 의미 검색, 키 없이 동작." />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <header class="hero">
    <h1>🧭 한국 오픈 API <span>자연어 검색</span></h1>
    <p class="tagline">
      “문자 보내는 API”, “지하철 도착 정보”, “키 없이 쓰는 번역”처럼
      <strong>하고 싶은 걸 한국어로</strong> 입력하세요. 의미로 찾아 호출 코드까지 만들어 드립니다.
    </p>
  </header>

  <main>
    <div class="search-bar">
      <input
        id="query"
        type="search"
        placeholder="예) 무료로 날씨 예보 가져오기 / 이름으로 성별 추정 / 따릉이 대여소 위치"
        autocomplete="off"
        autofocus
      />
      <button id="search-btn" type="button">검색</button>
    </div>

    <div class="filters">
      <label><input type="checkbox" id="f-noauth" /> 인증 불필요만</label>
      <label><input type="checkbox" id="f-https" /> HTTPS만</label>
      <label><input type="checkbox" id="f-cors" /> CORS 가능만</label>
      <select id="f-category"><option value="">전체 카테고리</option></select>
      <span class="spacer"></span>
      <span id="stats" class="stats"></span>
    </div>

    <div id="status" class="status" role="status"></div>
    <ul id="results" class="results"></ul>

    <p id="empty" class="empty hidden">
      검색어를 입력해 보세요. 예: <em>이미지 생성</em>, <em>환율</em>, <em>스팸 필터</em>, <em>지도</em>
    </p>
  </main>

  <footer>
    <p>
      데이터 출처: <a href="https://github.com/kmini0157/open-apis-korea" target="_blank" rel="noopener">open-apis-korea</a> ·
      <span id="footer-count"></span> ·
      의미 검색은 브라우저에서 <strong>로컬 임베딩</strong>(multilingual-e5-small)으로 처리되며 서버로 전송되지 않습니다.
    </p>
  </footer>

  <script type="module" src="./app.js"></script>
</body>
</html>
